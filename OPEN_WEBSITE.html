<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolexPay - Click to Open</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0F2B5B 0%, #1AC61A 100%);
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }
        h1 {
            color: #0F2B5B;
            margin: 0 0 10px 0;
            font-size: 32px;
        }
        p {
            color: #6B7280;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 30px 0;
        }
        a {
            display: inline-block;
            background: linear-gradient(135deg, #0F2B5B 0%, #1AC61A 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        .status {
            font-size: 12px;
            color: #10B981;
            margin-top: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 SolexPay</h1>
        <p>Banking for Nigerian Students</p>
        <a href="http://localhost:4200/" target="_blank">Click to Open SolexPay Webpage</a>
        <div class="status">✓ SolexPay website is live on localhost:4200</div>
    </div>

    <script>
        // Redirect to SolexPay website
        document.querySelector('a').onclick = function(e) {
            e.preventDefault();
            window.location.href = 'http://localhost:4200/';
        };
        
        // Auto-redirect after 1.5 seconds
        setTimeout(() => {
            window.location.href = 'http://localhost:4200/';
        }, 1500);
    </script>
</body>
</html>
